kind = "web"
previewPath = "/"
title = "Barbearia Modelo"
version = "1.0.0"
id = "artifacts/barbearia-modelo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22452

[services.development]
run = "pnpm --filter @workspace/barbearia-modelo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barbearia-modelo", "run", "build" ]
publicDir = "artifacts/barbearia-modelo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22452"
BASE_PATH = "/"
